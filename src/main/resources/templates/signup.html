<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-body">
<div class="auth-shell">
    <section class="auth-panel">
        <p class="eyebrow">Create Account</p>
        <h1>쇼핑몰 회원가입</h1>
        <form th:action="@{/signup}" method="post" th:object="${user}" class="auth-form">
            <label>
                <span>이름</span>
                <input type="text" th:field="*{fullName}" placeholder="이름 입력">
            </label>
            <label>
                <span>아이디</span>
                <input type="text" th:field="*{username}" placeholder="아이디 입력">
            </label>
            <label>
                <span>이메일</span>
                <input type="email" th:field="*{email}" placeholder="이메일 입력">
            </label>
            <label>
                <span>비밀번호</span>
                <input type="password" th:field="*{password}" placeholder="비밀번호 입력">
            </label>
            <p class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></p>
            <button class="primary-button" type="submit">회원가입</button>
        </form>
        <div class="auth-links">
            <a th:href="@{/login}">로그인</a>
            <a th:href="@{/store}">스토어 홈</a>
        </div>
    </section>
</div>
</body>
</html>
