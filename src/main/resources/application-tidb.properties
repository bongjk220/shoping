spring.config.activate.on-profile=tidb

spring.datasource.url=${TIDB_URL}
spring.datasource.username=${TIDB_USERNAME}
spring.datasource.password=${TIDB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# TiDB Cloud usernames must include the cluster-specific prefix, e.g. 12345678.root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
